version: "2"

services:
  sonarqube:
    image: sonarqube:7.9-community
    depends_on:
      - db
    ports:
      - "9000:9000"
    networks:
      - restaurantsonarnet
    environment:
      - sonar.jdbc.url=jdbc:postgresql://db:5432/sonar
    volumes:
      - restaurant_sonarqube_conf:/opt/sonarqube/conf
      - restaurant_sonarqube_data:/opt/sonarqube/data
      - restaurant_sonarqube_extensions:/opt/sonarqube/extensions

  db:
    image: postgres:11.1
    networks:
      - restaurantsonarnet
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
    volumes:
      - restaurant_postgresql:/var/lib/postgresql
      - restaurant_postgresql_data:/var/lib/postgresql/data

networks:
  restaurantsonarnet:
    driver: bridge

volumes:
  restaurant_sonarqube_conf:
  restaurant_sonarqube_data:
  restaurant_sonarqube_extensions:
  restaurant_postgresql:
  restaurant_postgresql_data: